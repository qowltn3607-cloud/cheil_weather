<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 회사 날씨 — 이태원</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-clear: #87CEEB;
    --sky-cloudy: #8BA5B5;
    --sky-rain: #4A5568;
    --sky-dust: #C9A96E;
    --sky-snow: #B8CDD9;
    --sky-storm: #2D3748;
    --ground: #2C2C2C;
    --building-main: #1a1a2e;
    --building-accent: #16213e;
    --window-on: #FFD700;
    --window-off: #0f3460;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── 상단 헤더 ── */
  .header {
    position: relative;
    z-index: 100;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #fff;
  }
  .logo span { color: #63B3ED; }

  .location-tag {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .api-section {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .api-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 7px 12px;
    color: #fff;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    width: 220px;
    outline: none;
    transition: border-color 0.3s;
  }
  .api-input:focus { border-color: #63B3ED; }
  .api-input::placeholder { color: rgba(255,255,255,0.3); }

  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
  }
  .btn-primary { background: #63B3ED; color: #000; }
  .btn-primary:hover { background: #90CDF4; transform: translateY(-1px); }
  .btn-demo { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  .btn-demo:hover { background: rgba(255,255,255,0.18); }

  /* ── 메인 씬 ── */
  .scene {
    flex: 1;
    position: relative;
    overflow: hidden;
    transition: background 2s ease;
  }

  /* 하늘 그라디언트 */
  .sky {
    position: absolute;
    inset: 0;
    transition: all 2s ease;
  }

  /* 태양 */
  .sun {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #FFE566, #FFB347);
    box-shadow: 0 0 60px 30px rgba(255,200,50,0.4), 0 0 120px 60px rgba(255,160,20,0.2);
    top: 12%; right: 15%;
    transition: all 2s ease;
  }

  /* 달 */
  .moon {
    position: absolute;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #E8E8C0;
    box-shadow: 0 0 30px 10px rgba(232,232,192,0.3);
    top: 10%; right: 12%;
    opacity: 0;
    transition: all 2s ease;
  }

  /* 구름 */
  .cloud {
    position: absolute;
    border-radius: 50px;
    background: rgba(255,255,255,0.9);
    filter: blur(1px);
    transition: opacity 2s ease;
    animation: float linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }

  @keyframes float {
    from { transform: translateX(-120%); }
    to   { transform: translateX(120vw); }
  }

  /* 비 */
  .rain-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
  }
  .raindrop {
    position: absolute;
    width: 2px;
    border-radius: 2px;
    background: linear-gradient(to bottom, transparent, rgba(174,214,241,0.8));
    animation: fall linear infinite;
  }
  @keyframes fall {
    from { transform: translateY(-100px) rotate(15deg); }
    to   { transform: translateY(110vh) rotate(15deg); }
  }

  /* 눈 */
  .snow-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
  }
  .snowflake {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    animation: snowfall linear infinite;
  }
  @keyframes snowfall {
    0%   { transform: translateY(-20px) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { transform: translateY(110vh) translateX(60px); opacity: 0; }
  }

  /* 미세먼지 */
  .dust-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s;
  }
  .dust-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(180,140,80,0.25) 0%, rgba(160,110,50,0.55) 100%);
    transition: all 2s;
  }
  .dust-particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,160,80,0.6);
    filter: blur(1px);
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translate(0,0); opacity: 0; }
    20%  { opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { transform: translate(80px, 40px); opacity: 0; }
  }

  /* 번개 */
  .lightning {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* ── 도시 스카이라인 ── */
  .cityscape {
    position: absolute;
    bottom: 0;
    width: 100%;
  }

  /* 원거리 건물들 */
  .bg-buildings {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 200px;
  }
  .bg-building {
    position: absolute;
    bottom: 0;
    background: rgba(20,20,40,0.7);
    border-radius: 3px 3px 0 0;
  }

  /* ── 제일기획 스타일 메인 건물 ── */
  .main-building-wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    gap: 0;
    z-index: 10;
    overflow: visible;
  }

  /* 좌우 저층 주변 건물 */
  .side-building {
    position: relative;
    bottom: 0;
  }
  .side-building-left {
    width: 70px; height: 120px;
    background: linear-gradient(180deg, #5a4535 0%, #3a2a20 100%);
    border-radius: 3px 0 0 0;
    margin-right: -2px;
    z-index: 8;
  }
  .side-building-right {
    width: 65px; height: 100px;
    background: linear-gradient(180deg, #6a5545 0%, #4a3530 100%);
    border-radius: 0 3px 0 0;
    margin-left: -2px;
    z-index: 8;
  }

  /* 메인 유리 타워 */
  .main-building {
    width: 340px;
    height: 440px;
    position: relative;
    border-radius: 8px 8px 0 0;
    /* 유리 커튼월: 청록+황금 빛 */
    background: linear-gradient(180deg,
      rgba(40,80,100,0.9) 0%,
      rgba(50,100,120,0.85) 15%,
      rgba(60,120,130,0.8) 30%,
      rgba(55,110,120,0.85) 50%,
      rgba(50,95,105,0.9) 70%,
      rgba(40,75,90,0.95) 100%
    );
    box-shadow:
      0 0 60px rgba(80,180,200,0.25),
      inset 0 0 80px rgba(255,200,80,0.08),
      2px 0 20px rgba(0,0,0,0.5),
      -2px 0 20px rgba(0,0,0,0.5);
    overflow: visible;
    border: 1px solid rgba(120,200,220,0.3);
  }

  /* 유리 반사 효과 */
  .glass-reflection {
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg,
      transparent 0%,
      rgba(255,255,255,0.04) 30%,
      rgba(255,255,255,0.08) 35%,
      transparent 40%,
      transparent 60%,
      rgba(255,255,255,0.03) 75%,
      transparent 80%
    );
    pointer-events: none;
    z-index: 20;
  }

  /* 건물 상단 톱니형 장식 (사진의 지붕선) */
  .rooftop-crown {
    position: absolute;
    top: -18px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 0;
  }
  .crown-tooth {
    width: 22px; height: 18px;
    background: linear-gradient(180deg, #7a8a95, #5a6a75);
    clip-path: polygon(15% 100%, 50% 0%, 85% 100%);
  }

  /* 안테나 */
  .antenna {
    position: absolute;
    top: -50px;
    left: 20%;
    width: 3px; height: 50px;
    background: linear-gradient(to top, #888, #ccc);
    border-radius: 2px;
  }
  .antenna-tip {
    position: absolute;
    top: -6px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff4444;
    animation: blink 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(255,50,50,0.8);
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  /* 층별 유리 패널 그리드 */
  .floor-grid {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 12px 8px 0;
    gap: 3px;
  }

  .floor-row {
    display: flex;
    gap: 3px;
    flex: 1;
  }

  .glass-panel {
    flex: 1;
    border-radius: 1px;
    position: relative;
    transition: background 1.5s ease, box-shadow 1.5s ease;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* 창문 타입별 색상 — 사진처럼 따뜻한 노란+청록 */
  .glass-panel.warm {
    background: linear-gradient(135deg, rgba(255,210,100,0.75), rgba(255,180,60,0.6));
    box-shadow: 0 0 10px rgba(255,200,80,0.4), inset 0 0 6px rgba(255,220,120,0.3);
  }
  .glass-panel.cool {
    background: linear-gradient(135deg, rgba(80,200,220,0.65), rgba(60,160,190,0.5));
    box-shadow: 0 0 10px rgba(80,200,220,0.4), inset 0 0 6px rgba(120,220,240,0.3);
  }
  .glass-panel.dim {
    background: linear-gradient(135deg, rgba(40,80,100,0.8), rgba(30,60,80,0.9));
    box-shadow: none;
  }
  .glass-panel.mix {
    background: linear-gradient(135deg, rgba(255,200,80,0.5), rgba(80,180,210,0.4));
    box-shadow: 0 0 8px rgba(180,210,180,0.3);
  }

  /* 수평 프레임 라인 */
  .h-frame {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: rgba(60,90,110,0.8);
    z-index: 5;
  }

  /* 수직 프레임 라인 */
  .v-frames {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-evenly;
    pointer-events: none;
    z-index: 5;
  }
  .v-frame {
    width: 3px;
    height: 100%;
    background: rgba(60,90,110,0.7);
  }

  /* Cheil 사이니지 */
  .company-sign {
    position: absolute;
    top: -50px;
    left: 0px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    color: #fff;
    text-shadow:
      0 0 20px rgba(255,255,255,0.9),
      0 0 40px rgba(255,255,255,0.5),
      0 0 60px rgba(180,230,255,0.3);
    font-style: italic;
  }

  /* 옥상 장비들 */
  .rooftop-equipment {
    position: absolute;
    top: 4px;
    right: 30px;
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }
  .equip-box {
    background: rgba(80,100,110,0.8);
    border-radius: 2px;
  }

  /* 수직 날개 프레임 (건물 양쪽 두꺼운 테두리) */
  .building-frame-left {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(90deg, rgba(40,60,75,0.95), rgba(55,80,95,0.6));
    z-index: 6;
    border-radius: 8px 0 0 0;
  }
  .building-frame-right {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(270deg, rgba(40,60,75,0.95), rgba(55,80,95,0.6));
    z-index: 6;
    border-radius: 0 8px 0 0;
  }

  /* 나무들 */
  .tree {
    position: absolute;
    bottom: 80px;
    z-index: 9;
  }
  .tree-trunk {
    width: 8px; height: 20px;
    background: #5a3a1a;
    margin: 0 auto;
    border-radius: 2px;
  }
  .tree-top {
    width: 0; height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-bottom: 40px solid #2d5a27;
    margin-bottom: -4px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  }
  .tree-top2 {
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-bottom: 32px solid #3a7a32;
    margin: 0 auto -4px;
  }

  /* side building 창들 */
  .side-windows {
    padding: 10px 6px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 4px;
  }
  .side-win {
    height: 10px;
    border-radius: 1px;
    background: rgba(255,200,100,0.5);
  }

  /* 도로 */
  .road {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(to bottom, #1a1a1a, #111);
    z-index: 5;
  }
  .road-line {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, #FFD700 0px, #FFD700 40px, transparent 40px, transparent 80px);
    opacity: 0.3;
  }

  /* 가로등 */
  .streetlight {
    position: absolute;
    bottom: 80px;
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .light-pole { width: 4px; height: 100px; background: #888; }
  .light-head {
    width: 24px; height: 8px;
    background: #aaa;
    border-radius: 4px 4px 0 0;
    position: relative;
  }
  .light-glow {
    position: absolute;
    bottom: -20px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 30px;
    background: radial-gradient(ellipse, rgba(255,220,100,0.4), transparent);
    border-radius: 50%;
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:0.8} 50%{opacity:0.4} }

  /* ── 정보 패널 ── */
  .info-panel {
    position: absolute;
    left: 28px;
    top: 80px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 200px;
  }

  .weather-card {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 24px;
    min-width: 200px;
  }

  .temp-display {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 64px;
    line-height: 1;
    color: #fff;
    letter-spacing: -2px;
  }
  .temp-unit { font-size: 28px; color: rgba(255,255,255,0.6); }
  .weather-desc {
    margin-top: 6px;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
  }
  .weather-icon-big { font-size: 40px; margin-bottom: 8px; }

  .stat-mini {
    margin-top: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.5px;
  }
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .stat-item {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 4px; }
  .stat-value { font-size: 16px; font-weight: 700; color: #fff; }

  /* 미세먼지 게이지 */
  .dust-bar-wrap { margin-top: 14px; }
  .dust-bar-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .dust-bar-bg { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .dust-bar-fill { height: 100%; border-radius: 3px; transition: width 2s ease, background 2s ease; }

  /* 날씨 상태 뱃지 */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 8px;
    transition: all 1s;
  }

  /* 데모 컨트롤러 */
  .demo-panel {
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    min-width: 180px;
  }
  .demo-title {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .weather-btn {
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .weather-btn:hover { background: rgba(255,255,255,0.12); transform: translateX(3px); }
  .weather-btn.active { background: rgba(99,179,237,0.2); border-color: rgba(99,179,237,0.5); }

  /* 업데이트 시간 */
  .update-time {
    position: absolute;
    bottom: 90px;
    right: 28px;
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    z-index: 50;
  }

  /* 물웅덩이 */
  .puddles {
    position: absolute;
    bottom: 80px;
    width: 100%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s;
    z-index: 6;
  }
  .puddle {
    position: absolute;
    border-radius: 50%;
    background: rgba(100,150,200,0.25);
    border: 1px solid rgba(100,150,200,0.3);
    animation: ripple 3s ease-in-out infinite;
  }
  @keyframes ripple {
    0%,100% { transform: scaleX(1); opacity: 0.4; }
    50% { transform: scaleX(1.05); opacity: 0.6; }
  }

  /* 안개 */
  .fog-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s;
  }
  .fog-layer {
    position: absolute;
    width: 200%;
    height: 120px;
    background: linear-gradient(90deg, transparent, rgba(180,180,200,0.4), transparent);
    filter: blur(20px);
    animation: fogMove linear infinite;
  }
  @keyframes fogMove {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0%); }
  }

  /* ── 모바일 완전 재설계 ── */
  @media (max-width: 768px) {

    body {
      overflow: hidden;
      height: 100dvh;
    }

    /* 헤더 축소 */
    .header {
      padding: 10px 14px;
      flex-wrap: nowrap;
      gap: 6px;
    }
    .logo { font-size: 14px; letter-spacing: 1px; }
    .location-tag { font-size: 9px; display: none; }
    .btn { padding: 6px 10px; font-size: 11px; }
    .api-section { gap: 6px; flex-shrink: 0; }

    /* 씬 — 건물이 보이는 메인 공간 */
    .scene { flex: 1; position: relative; overflow: hidden; }

    /* 정보 패널 — 씬 위에 좌상단 작게 */
    .info-panel {
      position: absolute;
      left: 12px;
      top: 12px;

function init() {
  buildBgBuildings();

  buildSideWindows();
  buildRooftopCrown();
  buildRain(300);
  buildSnow(150);
  buildDust(80);

  setInterval(twinkleFloors, 5000);
}

function buildRooftopCrown() {
  const crown = document.getElementById('rooftopCrown');
  if (!crown) return;
  for (let i = 0; i < 12; i++) {
    const t = document.createElement('div');
    t.className = 'crown-tooth';
    crown.appendChild(t);
  }
}

const FLOOR_CONFIGS = [
  [0.2, 0.4, 0.4],
  [0.5, 0.2, 0.3],
  [0.6, 0.1, 0.3],
  [0.4, 0.3, 0.3],
  [0.7, 0.0, 0.3],
  [0.5, 0.2, 0.3],
  [0.3, 0.4, 0.3],
  [0.6, 0.1, 0.3],
  [0.4, 0.2, 0.4],
];

let floorPanels = [];

function buildCheilBuilding() {
  const grid = document.getElementById('floorGrid');
  if (!grid) return;
  grid.innerHTML = '';
  floorPanels = [];
  FLOOR_CONFIGS.forEach((cfg, fi) => {
    const row = document.createElement('div');
    row.className = 'floor-row';
    const rowPanels = [];
    for (let c = 0; c < 8; c++) {
      const panel = document.createElement('div');
      panel.className = 'glass-panel ' + randomPanelType(cfg);
      row.appendChild(panel);
      rowPanels.push(panel);
    }
    floorPanels.push(rowPanels);
    grid.appendChild(row);
  });
}

function randomPanelType([warmR, coolR]) {
  const r = Math.random();
  if (r < warmR) return 'warm';
  if (r < warmR + coolR) return 'cool';
  if (r < warmR + coolR + 0.3) return 'mix';
  return 'dim';
}

function twinkleFloors() {
  floorPanels.forEach((row, fi) => {
    if (Math.random() > 0.4) return;
    row.forEach(panel => {
      if (Math.random() > 0.7) {
        panel.className = 'glass-panel ' + randomPanelType(FLOOR_CONFIGS[fi]);
      }
    });
  });
}

function buildSideWindows() {
  ['wingLeftWindows','wingRightWindows'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < 18; i++) {
      const w = document.createElement('div');
      w.className = 'side-win';
      w.style.opacity = Math.random() > 0.3 ? '0.8' : '0.2';
      el.appendChild(w);
    }
  });
}

function buildMainWindows() {}

function buildBgBuildings() {
  const container = document.getElementById('bgBuildings');
  const defs = [
    {left:2,w:60,h:120},{left:8,w:45,h:90},{left:15,w:80,h:160},
    {left:25,w:55,h:100},{left:33,w:40,h:140},{left:40,w:70,h:80},

    {left:83,w:45,h:95},{left:89,w:60,h:170},{left:95,w:40,h:85},
  ];
  defs.forEach(d => {
    const el = document.createElement('div');
    el.className = 'bg-building';
    el.style.cssText = `left:${d.left}%;width:${d.w}px;height:${d.h}px;opacity:${0.4+Math.random()*0.3}`;

      const row = document.createElement('div');
      row.style.cssText = `display:flex;gap:5px;justify-content:center;margin-top:8px;`;
      for (let j = 0; j < Math.floor(d.w/18); j++) {
        const w = document.createElement('div');
        w.style.cssText = `width:8px;height:10px;border-radius:1px;background:${Math.random()>0.4?'rgba(255,220,100,0.6)':'rgba(30,50,90,0.8)'};`;
        row.appendChild(w);
      }
      el.appendChild(row);
    }
    container.appendChild(el);
  });
}

function buildRain(count) {
  const container = document.getElementById('rainContainer');
  container.innerHTML = '';
  raindrops = [];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'raindrop';
    const length = 10 + Math.random() * 20;
    el.style.cssText = `
      left:${Math.random()*110-5}%;
      height:${length}px;
      opacity:${0.4+Math.random()*0.6};
      animation-duration:${0.4+Math.random()*0.6}s;
      animation-delay:${-Math.random()*2}s;
      display:none;
    `;
    container.appendChild(el);
    raindrops.push(el);
  }
}

function buildSnow(count) {
  const container = document.getElementById('snowContainer');
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'snowflake';
    const size = 3 + Math.random() * 6;
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      opacity:${0.5+Math.random()*0.5};
      animation-duration:${4+Math.random()*8}s;
      animation-delay:${-Math.random()*10}s;
      display:none;
    `;
    container.appendChild(el);
  }
}

function buildDust(count) {
  const container = document.getElementById('dustContainer');

    const el = document.createElement('div');
    el.className = 'dust-particle';
    const size = 4 + Math.random() * 12;
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*60}%;
      width:${size}px; height:${size}px;
      opacity:${0.3+Math.random()*0.5};
      animation-duration:${6+Math.random()*12}s;
      animation-delay:${-Math.random()*8}s;
      display:none;
    `;
    container.appendChild(el);
    dustParticles.push(el);
  }
}

function buildStars(count) {
  const scene = document.getElementById('scene');
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'star-dot';
    const size = 1 + Math.random() * 2.5;
    el.style.cssText = `
      position:absolute;
      left:${Math.random()*100}%;
      top:${Math.random()*50}%;
      width:${size}px; height:${size}px;
      border-radius:50%;
      background:white;
      opacity:0;
      transition: opacity 2s;
      animation: blink ${2+Math.random()*3}s ease-in-out infinite;
      animation-delay:${Math.random()*3}s;
      z-index:1;
    `;
    scene.appendChild(el);
    stars.push(el);
  }
}

// ───────────────────────────────────────────────
// 날씨 적용
// ───────────────────────────────────────────────
function applyWeather(type) {
  currentWeather = type;
  const w = WEATHERS[type];

  // 버튼 업데이트
  document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('btn-' + type);
  if (activeBtn) activeBtn.classList.add('active');

  // 하늘
  document.getElementById('sky').style.background = w.skyGrad;

  // 해/달
  document.getElementById('sun').style.opacity = w.sunOpacity;
  document.getElementById('moon').style.opacity = w.moonOpacity;

  // 구름
  updateClouds(w.cloudCount, w.cloudOpacity);

  // 비
  const rc = document.getElementById('rainContainer');
  if (w.rainOn) {
    rc.style.opacity = '1';
    const show = w.rainIntensity || 120;
    raindrops.forEach((el, i) => { el.style.display = i < show ? 'block' : 'none'; });
  } else {
    rc.style.opacity = '0';
  }

  // 눈
  const sc = document.getElementById('snowContainer');
  sc.style.opacity = w.snowOn ? '1' : '0';
  sc.querySelectorAll('.snowflake').forEach(el => { el.style.display = w.snowOn ? 'block' : 'none'; });

  // 미세먼지
  const dc = document.getElementById('dustContainer');
  dc.style.opacity = w.dustOn ? '1' : '0';
  dustParticles.forEach(el => { el.style.display = w.dustOn ? 'block' : 'none'; });

  // 안개
  document.getElementById('fogContainer').style.opacity = w.fogOn ? '1' : '0';

  // 물웅덩이
  document.getElementById('puddles').style.opacity = w.rainOn ? '1' : '0';

  // 별
  stars.forEach(el => { el.style.opacity = w.stars ? '1' : '0'; });

  // 번개
  clearInterval(lightningInterval);
  if (w.lightningOn) startLightning();

  // 정보 패널
  document.getElementById('weatherIcon').textContent = w.icon;
  document.getElementById('tempDisplay').innerHTML = `${w.temp}<span class="temp-unit">°C</span>`;
  document.getElementById('weatherDesc').textContent = w.desc;
  document.getElementById('humidity').textContent = `${w.humidity}%`;
  document.getElementById('windSpeed').textContent = `${w.wind} m/s`;
  document.getElementById('rainfall').textContent = `${w.rainfall} mm`;
  document.getElementById('pressure').textContent = `${w.pressure} hPa`;
  document.getElementById('dustValue').textContent = `${w.dust} ㎍/㎥`;

  const fill = document.getElementById('dustFill');
  fill.style.width = `${Math.min(w.dustWidth, 100)}%`;
  fill.style.background = w.dustColor;

  const badge = document.getElementById('statusBadge');
  badge.textContent = w.label;
  badge.style.cssText = `display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:30px;font-size:12px;font-weight:700;letter-spacing:1px;margin-top:8px;transition:all 1s;${w.badgeStyle}`;

  document.getElementById('updateTime').textContent = `마지막 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;
}

function updateClouds(count, opacity) {
  const existing = document.querySelectorAll('.cloud');
  existing.forEach(e => e.remove());

  const scene = document.getElementById('scene');
  for (let i = 0; i < count; i++) {
    const cloud = document.createElement('div');
    cloud.className = 'cloud';
    const w = 120 + Math.random() * 200;
    const h = 40 + Math.random() * 40;
    const top = 5 + Math.random() * 30;
    const dur = 30 + Math.random() * 60;
    cloud.style.cssText = `
      width:${w}px; height:${h}px;
      top:${top}%;
      opacity:${opacity * (0.7 + Math.random() * 0.3)};
      animation-duration:${dur}s;
      animation-delay:${-Math.random() * dur}s;
      z-index:2;
    `;
    cloud.innerHTML = `
      <div style="position:absolute;width:${w*0.6}px;height:${h*1.2}px;background:inherit;border-radius:50%;top:-${h*0.4}px;left:${w*0.15}px;"></div>
      <div style="position:absolute;width:${w*0.4}px;height:${h*1.1}px;background:inherit;border-radius:50%;top:-${h*0.3}px;left:${w*0.5}px;"></div>
    `;
    scene.appendChild(cloud);
  }
}

function startLightning() {
  lightningInterval = setInterval(() => {
    const el = document.getElementById('lightning');
    el.style.opacity = '0.7';
    setTimeout(() => { el.style.opacity = '0'; }, 80);
    setTimeout(() => {
      el.style.opacity = '0.4';
      setTimeout(() => { el.style.opacity = '0'; }, 60);
    }, 150);
  }, 3000 + Math.random() * 4000);
}

// ───────────────────────────────────────────────
// 랜덤 데모
// ───────────────────────────────────────────────
function cycleDemo() {
  const keys = Object.keys(WEATHERS);
  let next;
  do { next = keys[Math.floor(Math.random() * keys.length)]; } while (next === currentWeather);
  applyWeather(next);
  showToast(`${WEATHERS[next].icon} ${WEATHERS[next].desc}으로 변경!`);
}

// ───────────────────────────────────────────────
// 실제 API 연동 — /api/weather (Vercel 서버리스)
// ───────────────────────────────────────────────
async function fetchRealWeather() {
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  try {
    const res = await fetch('/api/weather');
    if (!res.ok) throw new Error(`서버 오류 ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const pty  = parseInt(data.pty  ?? '0');
    const temp = data.temp  ?? '--';
    const humid= data.humidity ?? '--';
    const wind = data.wind  ?? '--';

    // 날씨 유형 매핑
    const h = new Date().getHours();
    let weatherType = (h < 6 || h >= 21) ? 'night' : 'sunny';
    if      (pty === 1 || pty === 4) weatherType = 'rain';
    else if (pty === 2)              weatherType = 'rain';
    else if (pty === 3)              weatherType = 'snow';

    applyWeather(weatherType);

    // 실제 수치 덮어쓰기
    document.getElementById('tempDisplay').innerHTML = `${temp}<span class="temp-unit">°C</span>`;
    document.getElementById('humidity').textContent  = `${humid}%`;
    document.getElementById('windSpeed').textContent = `${wind} m/s`;

    showToast('✅ 실시간 날씨 연동 성공!');

  } catch (e) {
    showToast('❌ 오류: ' + e.message);
    console.error(e);
  } finally {
    loading.classList.remove('show');
  }
}

function formatDate(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function getBaseTime(d) {
  const h = d.getHours();
  const m = d.getMinutes();
  // 초단기실황은 매시 40분 발표
  const bh = m < 40 ? h - 1 : h;
  return `${String(Math.max(bh,0)).padStart(2,'0')}00`;
}

// ───────────────────────────────────────────────
// 토스트
// ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ───────────────────────────────────────────────
// 시간에 따라 자동으로 낮/밤 전환
// ───────────────────────────────────────────────
function autoTimeOfDay() {
  const h = new Date().getHours();
  if (currentWeather === 'sunny' && (h < 6 || h >= 21)) applyWeather('night');
  else if (currentWeather === 'night' && h >= 6 && h < 21) applyWeather('sunny');
}

// ───────────────────────────────────────────────
// 시작
// ───────────────────────────────────────────────
init();
autoTimeOfDay();
setInterval(autoTimeOfDay, 60000);
// 페이지 로드시 자동으로 실시간 날씨 불러오기
fetchRealWeather();
// 10분마다 자동 갱신
setInterval(fetchRealWeather, 10 * 60 * 1000);
</script>
